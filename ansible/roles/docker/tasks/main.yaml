---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present
  tags: [docker]

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [docker]

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.gpg
    mode: "0644"
  tags: [docker]

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
  tags: [docker]

- name: Install Docker CE and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  notify: Restart docker
  tags: [docker]

- name: Add fabri user to docker group
  ansible.builtin.user:
    name: "{{ ssh_user }}"
    groups: docker
    append: true
  tags: [docker]

- name: Check if proxy network exists
  ansible.builtin.shell: docker network inspect proxy
  register: proxy_network_check
  failed_when: false
  changed_when: false
  tags: [docker]

- name: Create proxy network
  ansible.builtin.shell: docker network create proxy
  when: proxy_network_check.rc != 0
  tags: [docker]
