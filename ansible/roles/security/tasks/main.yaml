---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  tags: [security]

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
  tags: [security]

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  tags: [security]

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  tags: [security]

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  tags: [security]

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: "on"
  tags: [security]

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  notify: Restart fail2ban
  tags: [security]

- name: Deploy fail2ban jail.local
  ansible.builtin.template:
    src: fail2ban_jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban
  tags: [security]

- name: Enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  tags: [security]
